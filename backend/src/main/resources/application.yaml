spring:
  application:
    name: student-management-system

  # DATABASE
  datasource:
    url: jdbc:mysql://localhost:3306/student_management_system?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password:

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Encoding
  messages:
    encoding: UTF-8

server:
  port: 8081

security:
  jwt:
    secret: ${JWT_SECRET:change-this-dev-secret-to-a-long-random-string}
    access-token-expiration: 900000
    refresh-token-expiration: 604800000
