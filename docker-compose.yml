services:
  mysql:
    image: mysql:8.0
    container_name: sms-mysql
    environment:
      MYSQL_DATABASE: student_management_system
      MYSQL_USER: sms
      MYSQL_PASSWORD: sms123
      MYSQL_ROOT_PASSWORD: root123
    ports:
      - "3306:3306"
    volumes:
      - sms_mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

  backend:
    build:
      context: ./backend
    container_name: sms-backend
    env_file:
      - path: .env
        required: false
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/student_management_system?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: sms
      SPRING_DATASOURCE_PASSWORD: sms123
    ports:
      - "8081:8081"
    depends_on:
      - mysql

  frontend:
    build:
      context: ./frontend
    container_name: sms-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: sms-phpmyadmin
    environment:
      PMA_HOST: mysql
    ports:
      - "8082:80"
    depends_on:
      - mysql

volumes:
  sms_mysql_data:
